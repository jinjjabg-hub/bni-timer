<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>BNI 타이머</title>
<style>
:root {
  --bg:#0a0e1a; --bg2:#111827; --bg3:#1c2333;
  --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.18);
  --text:#f0f4ff; --text2:#8b95b0; --text3:#4a5270;
  --blue:#3b82f6; --blue-bg:rgba(59,130,246,0.15);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,0.18);
  --red:#ef4444; --red-bg:rgba(239,68,68,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:env(safe-area-inset-top,16px) 20px env(safe-area-inset-bottom,16px);
  overflow-x:hidden;
}

/* ── HEADER ── */
.header{
  display:flex; align-items:center; justify-content:space-between;
  width:100%; max-width:900px; padding:14px 0 18px;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);box-shadow:0 0 12px var(--blue);}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.5px;}
.logo-sub{font-size:12px;color:var(--text2);}

/* ── LAYOUT: phone vs tablet ── */
.main-layout{
  display:flex; flex-direction:column; align-items:center;
  gap:14px; width:100%; max-width:900px;
}
@media(min-width:700px){
  .main-layout{flex-direction:row; align-items:flex-start; gap:32px;}
  .left-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:14px;}
  .right-col{flex:1; display:flex; flex-direction:column; gap:14px;}
}
.left-col{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;}
.right-col{width:100%; display:flex; flex-direction:column;}
@media(min-width:700px){.right-col{align-self:stretch;}}
.settings-panel{flex:1;}

/* ── MODE GRID ── */
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;}
.mbtn{
  padding:14px 4px 12px; border-radius:14px;
  border:1px solid var(--border); background:var(--bg2);
  cursor:pointer; text-align:center; transition:all .18s; -webkit-user-select:none;
}
.mbtn .mn{font-size:14px;font-weight:600;display:block;color:var(--text2);}
.mbtn .mt{font-size:12px;display:block;margin-top:4px;color:var(--text3);}
.mbtn.active{border-color:var(--blue);background:var(--blue-bg);}
.mbtn.active .mn{color:var(--blue);}
.mbtn.active .mt{color:rgba(59,130,246,.7);}

/* ── PRESET ROW ── */
.preset-row{
  display:flex; align-items:center; justify-content:center;
  gap:10px; height:44px; width:100%; transition:opacity .2s;
}
.preset-row.hidden{opacity:0;pointer-events:none;}
.plbl{font-size:12px;color:var(--text3);}
.pbtn{
  padding:9px 22px; border-radius:999px; border:1px solid var(--border);
  background:var(--bg2); font-size:14px; font-weight:500;
  cursor:pointer; color:var(--text2); transition:all .15s; -webkit-user-select:none;
}
.pbtn.sel{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}

/* ── BIG DISPLAY (태블릿용 번호판) ── */
.big-display{
  width:100%; border-radius:24px;
  background:#c0392b;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 20px 28px;
  position:relative; overflow:hidden;
  min-height:280px;
  box-shadow:0 8px 40px rgba(192,57,43,0.5);
  transition:background .4s;
}
.big-display::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.12), transparent 60%);
  pointer-events:none;
}
.big-display.amber-phase{background:#b8860b;box-shadow:0 8px 40px rgba(184,134,11,0.5);}
.big-display.idle-phase{background:#1a2540;box-shadow:none;}
.big-num{
  font-size:clamp(180px,26vw,300px); font-weight:900;
  color:#fff; font-variant-numeric:tabular-nums;
  letter-spacing:-6px; line-height:.85;
  text-shadow:0 6px 40px rgba(0,0,0,0.5);
  transition:font-size .3s;
}
@media(min-width:700px){.big-num{font-size:clamp(220px,22vw,340px);}}
.big-label{
  font-size:18px; font-weight:600; color:rgba(255,255,255,0.75);
  margin-top:14px; letter-spacing:3px; text-transform:uppercase;
}
.big-label.flash{animation:labelFlash .35s ease-in-out infinite;}
.flag-overlay{
  position:absolute; top:12px; right:18px;
  font-size:52px; display:none;
  animation:wildFlag .28s ease-in-out infinite;
  transform-origin:center bottom;
}
.flag-overlay.show{display:block;}

/* ── RING (폰에서만) ── */
.ring-section{display:flex;flex-direction:column;align-items:center;gap:0;}
@media(min-width:700px){.ring-section{display:none;}}
.ring-outer{
  position:relative; width:240px; height:240px;
  display:flex; align-items:center; justify-content:center;
}
.ripple,.ripple2{
  position:absolute; inset:-8px; border-radius:50%;
  border:3px solid rgba(245,158,11,.8); opacity:0; display:none; pointer-events:none;
}
.ring-wrap{position:relative;width:220px;height:220px;}
.ring-wrap svg{transform:rotate(-90deg);}
.center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border-radius:50%;transition:background .3s;
}
.alert-icon{display:none;line-height:1;margin-bottom:4px;}
.alert-icon svg{width:50px;height:50px;}
.tnum{
  font-size:68px; font-weight:700; color:var(--text);
  font-variant-numeric:tabular-nums; letter-spacing:-4px; line-height:1;
  transition:font-size .3s;
}
.tnum.shrink{font-size:44px;}
.tlbl{font-size:13px;color:var(--text3);margin-top:8px;letter-spacing:1px;font-weight:500;}
.tlbl.amber{color:var(--amber);font-size:15px;font-weight:700;animation:labelFlash .35s ease-in-out infinite;}
.tlbl.red{color:var(--red);font-size:15px;font-weight:700;animation:labelFlash .3s ease-in-out infinite;}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:12px;width:100%;}
.btn{
  flex:1; padding:18px 16px; border-radius:16px;
  border:1px solid var(--border); background:var(--bg2);
  font-size:17px; font-weight:600; cursor:pointer; color:var(--text2);
  transition:all .15s; -webkit-user-select:none; font-family:inherit;
}
.btn:active{transform:scale(.96);}
.btn.go{
  background:var(--blue); border-color:var(--blue); color:#fff;
  box-shadow:0 4px 20px rgba(59,130,246,.35);
}
.btn.go.running{background:var(--bg2);border-color:var(--border);color:var(--text2);box-shadow:none;}

/* ── SETTINGS PANEL ── */
.settings-panel{
  width:100%; border:1px solid var(--border); border-radius:20px;
  background:var(--bg2); overflow:hidden;
}
.settings-tabs{
  display:flex; border-bottom:1px solid var(--border);
}
.stab{
  flex:1; padding:13px 8px; background:none; border:none;
  font-size:13px; font-weight:500; color:var(--text3);
  cursor:pointer; font-family:inherit; transition:all .15s;
  border-bottom:2px solid transparent; margin-bottom:-1px;
}
.stab.active{color:var(--blue);border-bottom-color:var(--blue);}
.stab-content{display:none;padding:20px;}
.stab-content.active{display:block;}
.smode{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.smode:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.smtitle{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.smtitle::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.slbl{font-size:13px;color:var(--text2);}
.sinps{display:flex;align-items:center;gap:6px;}
.sinp{
  width:60px;padding:9px 10px;border-radius:10px;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--text);font-size:14px;text-align:right;font-family:inherit;font-weight:500;
}
.sinp:focus{outline:none;border-color:var(--blue);}
.su{font-size:12px;color:var(--text3);}
.name-inp{
  font-size:14px;font-weight:600;border:none;background:transparent;
  color:var(--text);font-family:inherit;
  border-bottom:1px solid var(--border2);padding-bottom:2px;width:100px;
}
.name-inp:focus{outline:none;border-color:var(--blue);}

/* 벨소리 선택 */
.bell-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:4px;}
.bell-opt{
  padding:12px 10px; border-radius:12px; border:1px solid var(--border);
  background:var(--bg3); cursor:pointer; text-align:center;
  transition:all .15s; -webkit-user-select:none;
}
.bell-opt .bo-icon{font-size:26px;display:block;margin-bottom:5px;}
.bell-opt .bo-name{font-size:12px;font-weight:500;color:var(--text2);}
.bell-opt.sel{border-color:var(--blue);background:var(--blue-bg);}
.bell-opt.sel .bo-name{color:var(--blue);}
.bell-preview{
  margin-top:12px; padding:10px 14px; border-radius:10px;
  background:var(--bg3); border:1px solid var(--border);
  font-size:13px; color:var(--text2); cursor:pointer;
  text-align:center; transition:background .15s;
}
.bell-preview:active{background:var(--blue-bg);}

/* ── ANIMATIONS ── */
@keyframes crazyShake{
  0%,100%{transform:translate(0,0) rotate(0);}
  8%{transform:translate(-10px,-3px) rotate(-2deg);}
  16%{transform:translate(10px,3px) rotate(2deg);}
  24%{transform:translate(-10px,2px) rotate(-1.5deg);}
  32%{transform:translate(10px,-3px) rotate(1.5deg);}
  40%{transform:translate(-7px,3px) rotate(-1deg);}
  48%{transform:translate(7px,-2px) rotate(1deg);}
  56%{transform:translate(-7px,-3px) rotate(-1.5deg);}
  64%{transform:translate(7px,3px) rotate(1.5deg);}
  72%{transform:translate(-4px,-1px);}80%{transform:translate(4px,1px);}
  90%{transform:translate(-2px,0);}
}
@keyframes rippleOut{0%{transform:scale(1);opacity:.9;}100%{transform:scale(1.6);opacity:0;}}
@keyframes rippleOut2{0%{transform:scale(1);opacity:.7;}100%{transform:scale(1.7);opacity:0;}}
@keyframes flashAmber{0%,100%{background:rgba(245,158,11,.12);}50%{background:rgba(245,158,11,.5);}}
@keyframes flashRed{0%,100%{background:rgba(239,68,68,.12);}50%{background:rgba(239,68,68,.5);}}
@keyframes wildFlag{
  0%{transform:rotate(-45deg) scale(1.5);}20%{transform:rotate(45deg) scale(1.8);}
  40%{transform:rotate(-38deg) scale(1.4);}60%{transform:rotate(42deg) scale(1.7);}
  80%{transform:rotate(-45deg) scale(1.5);}100%{transform:rotate(45deg) scale(1.8);}
}
@keyframes strokeFlash{0%,100%{opacity:1;}45%,55%{opacity:.05;}}
@keyframes labelFlash{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes bigNumPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}


/* ── FLAG PANEL (right col alert) ── */
.flag-panel{
  display:none; position:relative; overflow:hidden;
  width:100%; border-radius:20px;
  background:#b8860b;
  flex:1; min-height:0;
  align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
  box-shadow:0 8px 40px rgba(184,134,11,0.6);
}
.flag-panel.show{display:flex;}
.flag-panel.bell-mode{background:#8b0000;box-shadow:0 8px 40px rgba(139,0,0,0.6);}
@keyframes flagSwing{
  0%{transform:rotate(-25deg);}
  25%{transform:rotate(25deg);}
  50%{transform:rotate(-20deg);}
  75%{transform:rotate(22deg);}
  100%{transform:rotate(-25deg);}
}
@keyframes flagPanelFlash{
  0%,100%{background:#b8860b;}
  50%{background:#d4a017;}
}
@keyframes bellPanelFlash{
  0%,100%{background:#8b0000;}
  50%{background:#c0392b;}
}
.flag-panel.show:not(.bell-mode){animation:flagPanelFlash 1.2s ease-in-out infinite;}
.flag-panel.show.bell-mode{animation:bellPanelFlash 1.0s ease-in-out infinite;}
.flag-icon-big{
  font-size:120px; display:block;
  animation:flagSwing .8s ease-in-out infinite;
  transform-origin:center bottom;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,0.4));
}
.flag-panel-label{
  font-size:28px; font-weight:800; color:#fff;
  letter-spacing:4px; text-transform:uppercase;
  text-shadow:0 2px 12px rgba(0,0,0,0.4);
  animation:labelFlash 1.2s ease-in-out infinite;
}

.ring-outer.shaking .ring-wrap{animation:crazyShake .32s ease-in-out infinite;}
.ripple.go{display:block;animation:rippleOut .75s ease-out infinite;}
.ripple2.go{display:block;animation:rippleOut2 .75s ease-out infinite;animation-delay:.37s;}
.center.flag-bg{animation:flashAmber .32s ease-in-out infinite;}
.center.bell-bg{animation:flashRed .28s ease-in-out infinite;}
.alert-icon.show{display:block;animation:wildFlag .28s ease-in-out infinite;transform-origin:center bottom;}
.alert-icon.bell-show{display:block;animation:wildFlag .45s ease-in-out infinite;transform-origin:center;}
#rp.flash-amber{animation:strokeFlash .32s ease-in-out infinite;}
#rp.flash-red{animation:strokeFlash .28s ease-in-out infinite;}
.big-display.shaking{animation:none;}
.big-num.pulse{animation:bigNumPulse .32s ease-in-out infinite;}
</style>

  var c=document.createElement('canvas');
  c.width=512;c.height=512;

  ctx.strokeStyle='#3b82f6';ctx.lineWidth=18;

  // 눈금
  for(var i=0;i<12;i++){
    var a=i*Math.PI/6;
    var r1=i%3===0?168:178, r2=195;
    ctx.strokeStyle=i%3===0?'#f0f4ff':'#4a5270';
    ctx.lineWidth=i%3===0?8:4;
    ctx.beginPath();
    ctx.moveTo(256+r1*Math.sin(a),256-r1*Math.cos(a));
    ctx.lineTo(256+r2*Math.sin(a),256-r2*Math.cos(a));
    ctx.stroke();
  }
  // 시침 (10시 위치)
  ctx.strokeStyle='#f0f4ff';ctx.lineWidth=16;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(256,256);
  ctx.lineTo(256+120*Math.sin(-Math.PI*2/3),256-120*Math.cos(-Math.PI*2/3));
  ctx.stroke();

  ctx.stroke();

  ctx.fillStyle='#3b82f6';
  ctx.beginPath();ctx.arc(256,256,12,0,Math.PI*2);ctx.fill();
  // BNI 텍스트

  ctx.fillText('BNI',256,460);

  fav.rel='icon';fav.type='image/png';fav.href=url;
  document.head.appendChild(fav);
  // manifest
  var manifest={
    name:'BNI 타이머',short_name:'BNI타이머',
    description:'BNI Pioneer Chapter 타이머',
    start_url:location.href,
    display:'standalone',
    background_color:'#0a0e1a',theme_color:'#3b82f6',

    icons:[{src:url,sizes:'512x512',type:'image/png',purpose:'any maskable'}]
  };
  var blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  var murl=URL.createObjectURL(blob);
  var ml=document.createElement('link');
  ml.rel='manifest';ml.href=murl;
  document.head.appendChild(ml);

<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <div class="logo-text">BNI 타이머</div>
      <div class="logo-sub">Pioneer Chapter</div>
    </div>
  </div>
</div>

<div class="main-layout">

  <!-- LEFT / TOP -->
  <div class="left-col">

    <div class="mode-grid" id="modeGrid">
      <button class="mbtn active" onclick="selectMode(0)" style=""><span class="mn">위클리</span><span class="mt" id="mt0">30초</span></button>
      <button class="mbtn" onclick="selectMode(1)" style=""><span class="mn">피쳐</span><span class="mt" id="mt1">8분</span></button>
      <button class="mbtn" onclick="selectMode(2)" style=""><span class="mn">교육</span><span class="mt" id="mt2">10분</span></button>
      <button class="mbtn" onclick="selectMode(3)" style=""><span class="mn" id="mn3">인포머셜</span><span class="mt" id="mt3">15초</span></button>
    </div>

    <div class="preset-row" id="presetRow" style="">
      <span class="plbl">빠른 설정</span>
      <button class="pbtn sel" id="p30" onclick="applyPreset(30)">30초</button>
      <button class="pbtn" id="p40" onclick="applyPreset(40)">40초</button>
      <button class="pbtn" id="p50" onclick="applyPreset(50)">50초</button>
    </div>

    <!-- BIG RED DISPLAY (태블릿에서 주력) -->
    <div class="big-display idle-phase" id="bigDisplay" style="">
      <div class="flag-overlay" id="flagOverlay">🚩</div>
      <div class="big-num" id="bigNum">30</div>
      <div class="big-label" id="bigLabel">시작 전</div>
    </div>

    <!-- 링 (폰 전용) -->
    <div class="ring-section">
      <div class="ring-outer" id="ringOuter">
        <div class="ripple" id="ripple1" style=""></div>
        <div class="ripple2" id="ripple2" style=""></div>
        <div class="ring-wrap">
          <svg width="220" height="220" viewBox="0 0 220 220">
            <circle cx="110" cy="110" r="98" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="12"></circle>
            <circle id="rp" cx="110" cy="110" r="98" fill="none" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" stroke-dasharray="615.75" stroke-dashoffset="0" style="transition: stroke-dashoffset 0.95s linear, stroke 0.4s; stroke-dashoffset: 0; stroke: rgb(59, 130, 246);" class=""></circle>
          </svg>
          <div class="center" id="centerArea">
            <div class="alert-icon" id="alertIcon">
              <svg id="alertSvg" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
            </div>
            <div class="tnum" id="tnum">30</div>
            <div class="tlbl" id="tlbl">시작 전</div>
          </div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn go" id="startBtn" onclick="toggleTimer()">시작</button>
      <button class="btn" onclick="resetTimer()">리셋</button>
    </div>

  </div><!-- /left-col -->

  <!-- RIGHT / BOTTOM: settings -->
  <div class="right-col">
    <!-- 깃발/벨 풀패널 -->
    <div class="flag-panel" id="flagPanel">
      <span class="flag-icon-big" id="flagIconBig">🚩</span>
      <div class="flag-panel-label" id="flagPanelLabel">깃발!!!</div>
    </div>
    <div class="settings-panel" id="settingsPanel" style="">
      <div class="settings-tabs">
        <button class="stab active" onclick="switchTab(&#39;time&#39;)">⏱ 시간 설정</button>
        <button class="stab" onclick="switchTab(&#39;bell&#39;)">🔔 벨소리</button>
      </div>

      <!-- 시간 설정 탭 -->
      <div class="stab-content active" id="tab-time">
        <div id="sinner"><div class="smode">
      <div class="smtitle"><span>위클리</span></div>
      <div class="srow"><span class="slbl">총 시간</span>
        <div class="sinps">
          <input type="number" class="sinp" min="0" max="99" value="0" onchange="setTotal(0,this.value,null)">
          <span class="su">분</span>
          <input type="number" class="sinp" min="0" max="59" value="30" onchange="setTotal(0,null,this.value)">

      </div>
      <div class="srow"><span class="slbl">깃발 (종료 전)</span>

          <input type="number" class="sinp" min="0" max="99" value="0" onchange="setFlag(0,this.value,null)">
          <span class="su">분</span>
          <input type="number" class="sinp" min="0" max="59" value="10" onchange="setFlag(0,null,this.value)">
          <span class="su">초</span>
        </div>
      </div>
    </div><div class="smode">
      <div class="smtitle"><span>피쳐</span></div>
      <div class="srow"><span class="slbl">총 시간</span>
        <div class="sinps">
          <input type="number" class="sinp" min="0" max="99" value="8" onchange="setTotal(1,this.value,null)">
          <span class="su">분</span>
          <input type="number" class="sinp" min="0" max="59" value="0" onchange="setTotal(1,null,this.value)">
          <span class="su">초</span>
        </div>
      </div>
      <div class="srow"><span class="slbl">깃발 (종료 전)</span>
        <div class="sinps">
          <input type="number" class="sinp" min="0" max="99" value="2" onchange="setFlag(1,this.value,null)">
          <span class="su">분</span>
          <input type="number" class="sinp" min="0" max="59" value="0" onchange="setFlag(1,null,this.value)">
          <span class="su">초</span>
        </div>
      </div>
    </div><div class="smode">
      <div class="smtitle"><span>교육</span></div>
      <div class="srow"><span class="slbl">총 시간</span>
        <div class="sinps">
          <input type="number" class="sinp" min="0" max="99" value="10" onchange="setTotal(2,this.value,null)">
          <span class="su">분</span>
          <input type="number" class="sinp" min="0" max="59" value="0" onchange="setTotal(2,null,this.value)">
          <span class="su">초</span>
        </div>
      </div>
      <div class="srow"><span class="slbl">깃발 (종료 전)</span>
        <div class="sinps">
          <input type="number" class="sinp" min="0" max="99" value="1" onchange="setFlag(2,this.value,null)">
          <span class="su">분</span>
          <input type="number" class="sinp" min="0" max="59" value="0" onchange="setFlag(2,null,this.value)">
          <span class="su">초</span>
        </div>
      </div>
    </div><div class="smode">
      <div class="smtitle"><input class="name-inp" value="인포머셜" onchange="modes[3].name=this.value;document.getElementById(&#39;mn3&#39;).textContent=this.value;"></div>
      <div class="srow"><span class="slbl">총 시간</span>
        <div class="sinps">
          <input type="number" class="sinp" min="0" max="99" value="0" onchange="setTotal(3,this.value,null)">
          <span class="su">분</span>
          <input type="number" class="sinp" min="0" max="59" value="15" onchange="setTotal(3,null,this.value)">
          <span class="su">초</span>
        </div>
      </div>
      <div class="srow"><span class="slbl">깃발 (종료 전)</span>
        <div class="sinps">
          <input type="number" class="sinp" min="0" max="99" value="0" onchange="setFlag(3,this.value,null)">
          <span class="su">분</span>
          <input type="number" class="sinp" min="0" max="59" value="10" onchange="setFlag(3,null,this.value)">
          <span class="su">초</span>
        </div>
      </div>
    </div></div>
      </div>

      <!-- 벨소리 탭 -->
      <div class="stab-content" id="tab-bell">
        <div class="bell-grid" id="bellGrid">
          <div class="bell-opt sel" onclick="selectBell(0)">
            <span class="bo-icon">🔔</span>
            <span class="bo-name">클래식 벨</span>
          </div>
          <div class="bell-opt" onclick="selectBell(1)">
            <span class="bo-icon">⚡</span>
            <span class="bo-name">긴급 알람</span>
          </div>
          <div class="bell-opt" onclick="selectBell(2)">
            <span class="bo-icon">🎵</span>
            <span class="bo-name">부드러운 차임</span>
          </div>
          <div class="bell-opt" onclick="selectBell(3)">
            <span class="bo-icon">🥁</span>
            <span class="bo-name">드럼롤</span>
          </div>
        </div>
        <div class="bell-preview" onclick="previewBell()">
          ▶ 미리 듣기
        </div>
      </div>

    </div>
  </div><!-- /right-col -->

</div><!-- /main-layout -->

<script>
const CIRC = 2*Math.PI*98;
const modes=[
  {name:'위클리',  totalSec:40,  flagBeforeSec:10},
  {name:'피쳐',    totalSec:480, flagBeforeSec:120},
  {name:'교육',    totalSec:600, flagBeforeSec:60},
  {name:'인포머셜',totalSec:30,  flagBeforeSec:10},
];
let cur=0, rem=40, running=false, iv=null;
let flagFired=false, bellFired=false, weeklyPreset=40;
let selectedBell=0;

/* ── TIME FORMAT ── */
function fmtTime(s){if(s<60)return s+'초';const m=Math.floor(s/60),sc=s%60;return sc===0?m+'분':m+'분 '+sc+'초';}
function fmtDisp(s){s=Math.max(0,s);const m=Math.floor(s/60),sc=s%60;return m===0?String(sc):m+':'+String(sc).padStart(2,'0');}

/* ── LABELS ── */
function updateLabels(){
  modes.forEach((m,i)=>{const el=document.getElementById('mt'+i);if(el)el.textContent=fmtTime(m.totalSec);});
  document.getElementById('mn3').textContent=modes[3].name;
}
function updatePresetBtns(){[30,40,50].forEach(v=>{const b=document.getElementById('p'+v);if(b)b.classList.toggle('sel',weeklyPreset===v);});}

/* ── MODE SELECT ── */
function applyPreset(sec){if(running)return;weeklyPreset=sec;modes[0].totalSec=sec;updateLabels();updatePresetBtns();resetTimer();}
function selectMode(i){
  if(running)return; cur=i;
  document.querySelectorAll('.mbtn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('presetRow').classList.toggle('hidden',i!==0);
  resetTimer(); renderTimeSettings();
}

/* ── DISPLAY UPDATE ── */
function updateDisp(r){
  const d=fmtDisp(r);
  document.getElementById('bigNum').textContent=d;
  document.getElementById('tnum').textContent=d;
  const fa=modes[cur].flagBeforeSec;
  const lbl=document.getElementById('tlbl'), blbl=document.getElementById('bigLabel');
  if(!running&&r===modes[cur].totalSec){
    lbl.textContent='시작 전';lbl.className='tlbl';
    blbl.textContent='시작 전';blbl.className='big-label';
  } else if(r<=0){
    lbl.textContent='종  료';lbl.className='tlbl red';
    blbl.textContent='종  료';blbl.className='big-label flash';
  } else if(r<=fa){
    lbl.textContent='깃발!!!';lbl.className='tlbl amber';
    blbl.textContent='깃발!!!';blbl.className='big-label flash';
  } else {
    lbl.textContent='진행 중';lbl.className='tlbl';
    blbl.textContent='진행 중';blbl.className='big-label';
  }
}
function updateRing(r){
  const total=modes[cur].totalSec, rp=document.getElementById('rp');
  rp.style.strokeDashoffset=CIRC*(1-(Math.max(0,r)/total));
  const fa=modes[cur].flagBeforeSec;
  if(r<=0)rp.style.stroke='#ef4444';
  else if(r<=fa)rp.style.stroke='#f59e0b';
  else rp.style.stroke='#3b82f6';
}

/* ── FLAG VISUAL ── */
function setFlagVisual(on){
  const bd=document.getElementById('bigDisplay'), bn=document.getElementById('bigNum');
  const fo=document.getElementById('flagOverlay');
  const c=document.getElementById('centerArea'), ai=document.getElementById('alertIcon');
  const ro=document.getElementById('ringOuter'), rp=document.getElementById('rp');
  const r1=document.getElementById('ripple1'), r2=document.getElementById('ripple2');
  if(on){
    bd.className='big-display amber-phase shaking'; bn.classList.add('pulse');
    fo.classList.add('show');
    c.classList.add('flag-bg'); ai.className='alert-icon show';
    document.getElementById('alertSvg').setAttribute('stroke','#f59e0b');
    document.getElementById('alertSvg').innerHTML='<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>';
    ro.classList.add('shaking'); rp.classList.add('flash-amber');
    r1.style.borderColor='rgba(245,158,11,.8)'; r2.style.borderColor='rgba(245,158,11,.5)';
    r1.classList.add('go'); r2.classList.add('go');
    document.getElementById('tnum').classList.add('shrink');
    if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
    // right panel
    const fp=document.getElementById('flagPanel'),sp=document.getElementById('settingsPanel');
    fp.className='flag-panel show'; sp.style.display='none';
    document.getElementById('flagIconBig').textContent='🚩';
    document.getElementById('flagPanelLabel').textContent='깃발!!!';
  } else {
    bd.className='big-display idle-phase'; bn.classList.remove('pulse');
    fo.classList.remove('show');
    c.classList.remove('flag-bg'); ai.className='alert-icon';
    ro.classList.remove('shaking'); rp.classList.remove('flash-amber');
    r1.classList.remove('go'); r2.classList.remove('go');
    document.getElementById('tnum').classList.remove('shrink');
    const fp=document.getElementById('flagPanel'),sp=document.getElementById('settingsPanel');
    fp.className='flag-panel'; sp.style.display='';
  }
}

/* ── BELL VISUAL ── */
function setBellVisual(on){
  const bd=document.getElementById('bigDisplay'), bn=document.getElementById('bigNum');
  const fo=document.getElementById('flagOverlay');
  const c=document.getElementById('centerArea'), ai=document.getElementById('alertIcon');
  const ro=document.getElementById('ringOuter'), rp=document.getElementById('rp');
  const r1=document.getElementById('ripple1'), r2=document.getElementById('ripple2');
  if(on){
    setFlagVisual(false);
    bd.className='big-display shaking'; bn.classList.add('pulse');
    // big display stays red (default) but shakes
    fo.innerHTML='🔔'; fo.classList.add('show');
    c.classList.add('bell-bg'); ai.className='alert-icon bell-show';
    document.getElementById('alertSvg').setAttribute('stroke','#ef4444');
    document.getElementById('alertSvg').innerHTML='<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>';
    ro.classList.add('shaking'); rp.classList.add('flash-red');
    r1.style.borderColor='rgba(239,68,68,.8)'; r2.style.borderColor='rgba(239,68,68,.5)';
    r1.classList.add('go'); r2.classList.add('go');
    document.getElementById('tnum').classList.add('shrink');
    if(navigator.vibrate)navigator.vibrate([500,100,500,100,500,100,500]);
  } else {
    bd.className='big-display idle-phase'; bn.classList.remove('pulse');
    fo.innerHTML='🚩'; fo.classList.remove('show');
    c.classList.remove('bell-bg'); ai.className='alert-icon';
    ro.classList.remove('shaking'); rp.classList.remove('flash-red');
    r1.classList.remove('go'); r2.classList.remove('go');
    document.getElementById('tnum').classList.remove('shrink');
  }
}

/* ── BELL SOUNDS ── */
function playBell(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const bells=[
      // 0: 클래식 벨
      ()=>{[[880,0],[1320,.1],[660,.22],[880,.5],[1100,.62]].forEach(([f,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(f,ctx.currentTime+d);g.gain.setValueAtTime(0,ctx.currentTime+d);g.gain.linearRampToValueAtTime(.5,ctx.currentTime+d+.01);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+2);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+2);});},
      // 1: 긴급 알람
      ()=>{for(let i=0;i<6;i++){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.setValueAtTime(i%2===0?1200:800,ctx.currentTime+i*.18);g.gain.setValueAtTime(0,ctx.currentTime+i*.18);g.gain.linearRampToValueAtTime(.35,ctx.currentTime+i*.18+.01);g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*.18+.16);o.start(ctx.currentTime+i*.18);o.stop(ctx.currentTime+i*.18+.16);}},
      // 2: 부드러운 차임
      ()=>{[[523,.0],[659,.3],[784,.6],[1047,.9]].forEach(([f,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(f,ctx.currentTime+d);g.gain.setValueAtTime(0,ctx.currentTime+d);g.gain.linearRampToValueAtTime(.4,ctx.currentTime+d+.05);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+2.5);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+2.5);});},
      // 3: 드럼롤
      ()=>{for(let i=0;i<12;i++){const o=ctx.createOscillator(),g=ctx.createGain(),buf=ctx.createBuffer(1,ctx.sampleRate*.05,ctx.sampleRate),data=buf.getChannelData(0);for(let j=0;j<data.length;j++)data[j]=(Math.random()*2-1)*.6;const src=ctx.createBufferSource();src.buffer=buf;src.connect(g);g.connect(ctx.destination);const t=ctx.currentTime+i*.08;g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);src.start(t);src.stop(t+.07);}},
    ];
    bells[selectedBell]();
  }catch(e){}
}

function previewBell(){playBell();}

function selectBell(i){
  selectedBell=i;
  document.querySelectorAll('.bell-opt').forEach((b,j)=>b.classList.toggle('sel',j===i));
}

/* ── TIMER ── */
function toggleTimer(){
  if(running){
    running=false;clearInterval(iv);
    document.getElementById('startBtn').textContent='재개';
    document.getElementById('startBtn').classList.remove('running');
  } else {
    running=true;
    document.getElementById('startBtn').textContent='일시정지';
    document.getElementById('startBtn').classList.add('running');
    document.querySelectorAll('.mbtn').forEach(b=>b.style.pointerEvents='none');
    document.getElementById('presetRow').style.pointerEvents='none';
    // turn red when running
    const bd=document.getElementById('bigDisplay');
    bd.classList.remove('idle-phase');
    bd.style.background='#c0392b';bd.style.boxShadow='0 8px 40px rgba(192,57,43,0.5)';
    iv=setInterval(tick,1000);
  }
}
function tick(){
  rem--;
  const fa=modes[cur].flagBeforeSec;
  if(rem<=fa&&!flagFired){flagFired=true;setFlagVisual(true);}
  if(rem<=0&&!bellFired){
    bellFired=true;rem=0;setBellVisual(true);playBell();
    clearInterval(iv);running=false;
    document.getElementById('startBtn').textContent='시작';
    document.getElementById('startBtn').classList.remove('running');
    document.querySelectorAll('.mbtn').forEach(b=>b.style.pointerEvents='');
    document.getElementById('presetRow').style.pointerEvents='';
  }
  updateDisp(rem);updateRing(rem);
}
function resetTimer(){
  clearInterval(iv);running=false;flagFired=false;bellFired=false;
  rem=modes[cur].totalSec;
  document.getElementById('startBtn').textContent='시작';
  document.getElementById('startBtn').classList.remove('running');
  setFlagVisual(false);setBellVisual(false);
  const fo=document.getElementById('flagOverlay');fo.innerHTML='🚩';
  document.getElementById('alertSvg').setAttribute('stroke','#f59e0b');
  document.getElementById('alertSvg').innerHTML='<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>';
  document.getElementById('ripple1').style.borderColor='';
  document.getElementById('ripple2').style.borderColor='';
  document.querySelectorAll('.mbtn').forEach(b=>b.style.pointerEvents='');
  document.getElementById('presetRow').style.pointerEvents='';
  const bd=document.getElementById('bigDisplay');
  bd.className='big-display idle-phase';
  bd.style.background=''; bd.style.boxShadow='';
  const rp=document.getElementById('rp');
  rp.style.transition='none';rp.style.strokeDashoffset='0';rp.style.stroke='#3b82f6';
  rp.getBoundingClientRect();
  rp.style.transition='stroke-dashoffset .95s linear,stroke .4s';
  updateDisp(rem);updateRing(rem);
}

/* ── TABS ── */
function switchTab(tab){
  document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('active',['time','bell'][i]===tab));
  document.querySelectorAll('.stab-content').forEach((c,i)=>c.classList.toggle('active',['time','bell'][i]===tab));
}

/* ── TIME SETTINGS ── */
function renderTimeSettings(){
  let html='';
  modes.forEach((m,i)=>{
    const tm=Math.floor(m.totalSec/60),ts=m.totalSec%60;
    const fm=Math.floor(m.flagBeforeSec/60),fs=m.flagBeforeSec%60;
    const nameEl=i===3
      ?`<input class="name-inp" value="${m.name}" onchange="modes[3].name=this.value;document.getElementById('mn3').textContent=this.value;">`
      :`<span>${m.name}</span>`;
    html+=`<div class="smode">
      <div class="smtitle">${nameEl}</div>
      <div class="srow"><span class="slbl">총 시간</span>
        <div class="sinps">
          <input type="number" class="sinp" min="0" max="99" value="${tm}" onchange="setTotal(${i},this.value,null)">
          <span class="su">분</span>
          <input type="number" class="sinp" min="0" max="59" value="${ts}" onchange="setTotal(${i},null,this.value)">
          <span class="su">초</span>
        </div>
      </div>
      <div class="srow"><span class="slbl">깃발 (종료 전)</span>
        <div class="sinps">
          <input type="number" class="sinp" min="0" max="99" value="${fm}" onchange="setFlag(${i},this.value,null)">
          <span class="su">분</span>
          <input type="number" class="sinp" min="0" max="59" value="${fs}" onchange="setFlag(${i},null,this.value)">
          <span class="su">초</span>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('sinner').innerHTML=html;
}
function setTotal(i,mv,sv){
  const m=modes[i],cm=Math.floor(m.totalSec/60),cs=m.totalSec%60;
  modes[i].totalSec=(mv!==null?(parseInt(mv)||0):cm)*60+(sv!==null?(parseInt(sv)||0):cs);
  if(i===0)weeklyPreset=modes[0].totalSec;
  updateLabels();if(i===cur&&!running)resetTimer();
}
function setFlag(i,mv,sv){
  const m=modes[i],cm=Math.floor(m.flagBeforeSec/60),cs=m.flagBeforeSec%60;
  modes[i].flagBeforeSec=(mv!==null?(parseInt(mv)||0):cm)*60+(sv!==null?(parseInt(sv)||0):cs);
}

/* ── INIT ── */
updateLabels();updateDisp(rem);updateRing(rem);updatePresetBtns();renderTimeSettings();

// 화면 꺼짐 방지
let wakeLock=null;
async function requestWakeLock(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen');}}catch(e){}}
document.getElementById('startBtn').addEventListener('click',requestWakeLock);
</script>
